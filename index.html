<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>מתנדבי יחידת פנתר</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1520;
    --surface: #112035;
    --surface2: #1a2d45;
    --accent: #e8a020;
    --accent2: #f0c060;
    --text: #f0f0f0;
    --text2: #7a90a8;
    --border: #1e3050;
    --green: #34d399;
    --red: #f87171;
    --blue: #60a5fa;
    --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Heebo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; direction: rtl; font-size: 16px; }

  .header {
    background: var(--surface);
    padding: 20px 16px 12px;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
  }
  .header-top { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .logo { width: 40px; height: 40px; background: var(--accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
  .header-title-wrap { flex: 1; cursor: pointer; }
  .header-title { font-size: 20px; font-weight: 700; }
  .header-sub { font-size: 13px; color: var(--text2); margin-top: 1px; }
  .refresh-btn { background: none; border: none; color: var(--text2); font-size: 24px; cursor: pointer; padding: 4px 8px; line-height: 1; }
  .refresh-btn:active { color: var(--accent); }

  .search-wrap { position: relative; margin-bottom: 12px; }
  .search-input {
    width: 100%; background: var(--bg); border: 1.5px solid var(--border);
    border-radius: 12px; padding: 13px 16px 13px 44px;
    font-size: 17px; font-family: 'Heebo', sans-serif; color: var(--text);
    direction: rtl; transition: border-color 0.2s; -webkit-appearance: none;
  }
  .search-input:focus { outline: none; border-color: var(--accent); }
  .search-input::placeholder { color: var(--text2); }
  .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text2); font-size: 18px; pointer-events: none; }
  .clear-btn { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text2); font-size: 20px; cursor: pointer; display: none; padding: 4px; }

  .filter-groups { display: flex; flex-direction: column; gap: 8px; }
  .filter-group-row { display: flex; align-items: center; gap: 8px; }
  .filter-group-label { font-size: 14px; font-weight: 600; color: var(--text); flex-shrink: 0; width: 95px; }
  .chips-and-count { display: flex; align-items: center; gap: 8px; flex: 1; }
  .chips-row { display: flex; gap: 6px; }
  .chip {
    flex-shrink: 0; padding: 8px 16px; border-radius: 20px; font-size: 14px;
    font-family: 'Heebo', sans-serif; font-weight: 500; cursor: pointer;
    border: 1.5px solid var(--border); background: var(--surface2); color: var(--text2);
    transition: all 0.15s; white-space: nowrap;
  }
  .chip.on-yes { background: rgba(52,211,153,0.2);  border-color: var(--green); color: var(--green); font-weight: 700; }
  .chip.on-no  { background: rgba(248,113,113,0.15); border-color: var(--red);   color: var(--red);  font-weight: 700; }

  .filter-count {
    font-size: 13px; font-weight: 700;
    margin-right: auto; white-space: nowrap;
    display: flex; flex-direction: column; align-items: flex-end; gap: 0;
  }
  .filter-count .cnt-row { display: flex; gap: 12px; }
  .filter-count .cnt-labels { display: flex; gap: 12px; font-size: 10px; font-weight: 500; color: var(--text2); margin-bottom: 1px; }
  .filter-count .cnt-yes { color: var(--green); min-width: 24px; text-align: center; }
  .filter-count .cnt-no  { color: var(--red); min-width: 24px; text-align: center; }
  .filter-count .lbl-yes { color: var(--green); min-width: 24px; text-align: center; }
  .filter-count .lbl-no  { color: var(--red); min-width: 24px; text-align: center; }

  .count-bar { padding: 10px 16px 4px; font-size: 14px; color: var(--text2); display: flex; align-items: center; justify-content: space-between; }
  .count-bar span { color: var(--accent); font-weight: 700; }
  .export-btn {
    background: var(--surface2); border: 1.5px solid var(--border);
    border-radius: 10px; color: var(--text2); font-size: 13px;
    font-family: 'Heebo', sans-serif; font-weight: 600;
    padding: 6px 12px; cursor: pointer; display: flex; align-items: center; gap: 5px;
    transition: all 0.15s; flex-shrink: 0;
  }
  .export-btn:active { background: var(--accent); color: #000; border-color: var(--accent); }
  .save-contact-btn {
    background: var(--surface2); border: 1.5px solid var(--border);
    border-radius: 10px; color: var(--blue); font-size: 14px;
    font-family: 'Heebo', sans-serif; font-weight: 700;
    padding: 14px 8px; cursor: pointer; display: flex; align-items: center;
    justify-content: center; gap: 6px; flex: 1; transition: all 0.15s;
  }
  .save-contact-btn:active { background: rgba(96,165,250,0.2); }

  .list { padding: 6px 16px 100px; }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); margin-bottom: 10px; overflow: hidden;
    cursor: pointer; transition: border-color 0.15s;
  }
  .card:active { opacity: 0.9; }
  .card.open { border-color: var(--accent); }

  .card-header { display: flex; align-items: center; gap: 10px; padding: 16px; }
  .card-name { font-size: 18px; font-weight: 700; flex: 1; }
  .card-city { font-size: 14px; color: var(--text2); margin-top: 3px; }
  .card-phone-preview { font-size: 13px; color: var(--text2); direction: ltr; text-align: left; white-space: nowrap; }
  .chevron { font-size: 14px; color: var(--text2); transition: transform 0.25s; flex-shrink: 0; }
  .card.open .chevron { transform: rotate(180deg); }

  .card-body { display: none; padding: 0 16px 16px; border-top: 1px solid var(--border); }
  .card.open .card-body { display: block; }
  .card-body-inner { padding-top: 14px; display: grid; grid-template-columns: 1fr 1fr; gap: 14px 16px; }

  .field.wide { grid-column: 1 / -1; }
  .field-label { font-size: 12px; color: var(--text2); margin-bottom: 3px; }
  .field-value { font-size: 16px; font-weight: 600; line-height: 1.4; }
  .field-value.phone { direction: ltr; color: var(--accent2); font-size: 18px; }
  .field-value.green { color: var(--green); }
  .field-value.red   { color: var(--red); }
  .field-value.blue  { color: var(--blue); font-weight: 500; font-size: 15px; }

  .actions { display: flex; gap: 10px; margin-top: 4px; grid-column: 1 / -1; }
  .btn { flex: 1; padding: 14px 8px; border-radius: 12px; border: none; font-size: 16px; font-family: 'Heebo', sans-serif; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; text-decoration: none; }
  .btn:active { opacity: 0.75; }
  .btn-call { background: var(--green); color: #000; }
  .btn-whatsapp { background: #25d366; color: #000; }

  .empty { text-align: center; padding: 60px 20px; color: var(--text2); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-title { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 8px; }

  mark { background: rgba(232,160,32,0.28); color: var(--accent2); border-radius: 3px; padding: 0 1px; }

  .loading-screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; z-index: 999; }
  .loading-logo { font-size: 56px; animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.1);opacity:0.7} }
  .loading-text { font-size: 16px; color: var(--text2); }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-banner { background: rgba(248,113,113,0.12); border: 1px solid rgba(248,113,113,0.3); border-radius: 10px; padding: 12px 14px; margin: 10px 16px; font-size: 14px; color: var(--red); display: none; }
  .last-updated { font-size: 12px; color: var(--text2); padding: 4px 16px 0; text-align: left; direction: ltr; }
</style>
</head>

<script>
const API_KEY    = 'AIzaSyCKZvu3_u3hU6XETtQ5sgM_VDEWy-0om7c';
const SHEET_ID   = '1NSUOn5NBINur6UVJIhcnH8SmeslZb_m13nfBWWf6618';
const SHEET_NAME = 'Form Responses 1';

/*
  מיפוי סופי מאומת מה-console:
  [0]  חותמת זמן
  [1]  שם פרטי
  [2]  שם משפחה
  [3]  טלפון
  [4]  יישוב
  [5]  סוג תאריך לידה
  [6]  תאריך לידה לועזי
  [7]  תאריך לידה עברי
  [8]  דגם הרכב
  [9]  כננת (כן/לא)
  [10] שדה ביניים
  [11] הדרכה מתקדמת (כן/ריק)
  [12] הדרכת כננות (כן/ריק)
  [13] תרגולי בוץ (כן/ריק)
  [14] ריענון מפגש חורף 11/25 (כן/לא/ריק)
  [15] ערכת פתיחה (תקינה/לא/ריק)
  [16] פריטים (אפוד זוהר, מדבקה, שלט...)
*/
const C = {
  FIRST:      1,
  LAST:       2,
  PHONE:      3,
  CITY:       4,
  DOB_TYPE:   5,
  DOB_G:      6,
  DOB_H:      7,
  CAR:        8,
  KANANET:    9,
  HAD_ADV:    11,
  HAD_KAN:    12,
  HAD_BOTS:   13,
  HAD_CHOREF: 14,
  EREKET:     15,
  ITEMS:      17,
};

const HAD_LABELS = [
  { idx: C.HAD_ADV,    name: 'הדרכה מתקדמת' },
  { idx: C.HAD_KAN,    name: 'הדרכת כננות' },
  { idx: C.HAD_BOTS,   name: 'תרגולי בוץ' },
  { idx: C.HAD_CHOREF, name: 'ריענון מפגש חורף 11/25' },
];

let DATA = [];
let openId = null;
let F = { kananet: null, apod: null, ereket: null };

function g(row, idx) { return ((row[idx]||'')+'').trim(); }

function isYes(v) {
  const t = (v||'').trim().toLowerCase();
  return t === 'כן' || t === 'פ' || t === 'true' || t === '✓' || t === 'תקינה';
}

function getKananet(r) { return isYes(g(r, C.KANANET)); }
function getEreket(r)  { return isYes(g(r, C.EREKET)); }
function getApod(r) {
  const items = g(r, C.ITEMS);
  if (!items) return false;
  return items.split(',').map(s => s.trim()).some(s => s.includes('אפוד זוהר'));
}
function getHadList(r) {
  return HAD_LABELS.filter(h => isYes(g(r, h.idx))).map(h => h.name);
}

async function loadData() {
  document.getElementById('loadingScreen').style.display = 'flex';
  document.getElementById('appContent').style.display = 'none';
  document.getElementById('errorBanner').style.display = 'none';

  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(SHEET_NAME)}?key=${API_KEY}`;
  try {
    const res = await fetch(url);
    if (!res.ok) { const e = await res.json(); throw new Error(e.error?.message || `HTTP ${res.status}`); }
    const json = await res.json();
    const rows = json.values || [];
    if (rows.length < 2) throw new Error('הגיליון ריק');
    DATA = rows.slice(1).filter(r => r.length > 2).map((r, i) => ({ _id: i, _raw: r }));
    document.getElementById('totalCount').textContent = `${DATA.length} מתנדבים`;
    document.getElementById('lastUpdated').textContent = 'עודכן: ' + new Date().toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' });
    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('appContent').style.display = 'block';
    updateCounts();
    render();
  } catch(e) {
    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('appContent').style.display = 'block';
    const b = document.getElementById('errorBanner');
    b.style.display = 'block';
    b.textContent = '⚠️ שגיאה: ' + e.message;
    document.getElementById('totalCount').textContent = 'שגיאה';
  }
}

function updateCounts() {
  let kanY=0, kanN=0, apodY=0, apodN=0, erekY=0, erekN=0;
  DATA.forEach(row => {
    const r = row._raw;
    getKananet(r) ? kanY++ : kanN++;
    getApod(r)    ? apodY++ : apodN++;
    getEreket(r)  ? erekY++ : erekN++;
  });
  const fmt = (y, n) =>
    `<div class="cnt-labels"><span class="lbl-yes">יש</span><span class="lbl-no">אין</span></div>` +
    `<div class="cnt-row"><span class="cnt-yes">${y}</span><span class="cnt-no">${n}</span></div>`;
  document.getElementById('cnt-kananet').innerHTML = fmt(kanY, kanN);
  document.getElementById('cnt-apod').innerHTML    = fmt(apodY, apodN);
  document.getElementById('cnt-ereket').innerHTML  = fmt(erekY, erekN);
}

function matchesFilters(row) {
  const r = row._raw;
  if (F.kananet === 'yes' && !getKananet(r)) return false;
  if (F.kananet === 'no'  &&  getKananet(r)) return false;
  if (F.apod    === 'yes' && !getApod(r))    return false;
  if (F.apod    === 'no'  &&  getApod(r))    return false;
  if (F.ereket  === 'yes' && !getEreket(r))  return false;
  if (F.ereket  === 'no'  &&  getEreket(r))  return false;
  return true;
}

function matchesSearch(row, q) {
  if (!q) return true;
  const r  = row._raw;

  // Support multiple terms separated by comma
  const rawTerms = q.split(',').map(s => s.trim()).filter(s => s.length > 0);
  if (rawTerms.length === 0) return true;

  // Row matches if it matches ANY of the terms (OR logic)
  return rawTerms.some(term => {
    const lq = term.toLowerCase();
    const pq = lq.replace(/\D/g, '');

    if (pq.length >= 3 && g(r, C.PHONE).replace(/\D/g, '').includes(pq)) return true;

    const first = g(r, C.FIRST).toLowerCase();
    const last  = g(r, C.LAST).toLowerCase();
    if (first.includes(lq) || last.includes(lq) || (first + ' ' + last).includes(lq)) return true;

    return [g(r, C.CITY), g(r, C.CAR), g(r, C.DOB_G), g(r, C.DOB_H)]
      .some(f => f.toLowerCase().includes(lq));
  });
}

function hl(text, q) {
  if (!q || !text) return text || '';
  const terms = q.split(',').map(s => s.trim()).filter(s => s.length > 0);
  let result = String(text);
  terms.forEach(term => {
    if (!term) return;
    const esc = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    result = result.replace(new RegExp(esc, 'gi'), m => `<mark>${m}</mark>`);
  });
  return result;
}

function yesNo(bool) {
  return bool
    ? `<div class="field-value green">יש ✓</div>`
    : `<div class="field-value red">אין</div>`;
}

function render() {
  const q = document.getElementById('searchInput').value;
  const results = DATA.filter(row => matchesFilters(row) && matchesSearch(row, q));
  document.getElementById('countText').innerHTML = `נמצאו <span>${results.length}</span> מתנדבים`;

  const list = document.getElementById('list');
  if (!results.length) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><div class="empty-title">לא נמצאו תוצאות</div><div>נסה לאפס פילטרים</div></div>`;
    return;
  }

  list.innerHTML = results.map(row => {
    const r = row._raw;
    const id = row._id;
    const isOpen = openId === id;

    const firstName = g(r, C.FIRST);
    const lastName  = g(r, C.LAST);
    const phone     = g(r, C.PHONE);
    const city      = g(r, C.CITY);
    const dobType   = g(r, C.DOB_TYPE).replace(/['"]/g, '').trim();
    const dobG      = g(r, C.DOB_G);
    const dobH      = g(r, C.DOB_H);
    const car       = g(r, C.CAR);
    const kananet   = getKananet(r);
    const ereket    = getEreket(r);
    const apod      = getApod(r);
    const hadList   = getHadList(r);

    const isHebrew = dobType === 'עברי' || dobType === "עב'";
    const dob = isHebrew ? dobH : dobG;

    const fullName = (firstName + ' ' + lastName).trim();
    const phoneClean = phone.replace(/\D/g, '');
    const waPhone = phoneClean.startsWith('972') ? phoneClean : '972' + phoneClean.replace(/^0/, '');

    const hadDisplay = hadList.length
      ? `<div class="field-value blue">${hadList.join(' · ')}</div>`
      : `<div class="field-value red">לא</div>`;

    return `<div class="card ${isOpen ? 'open' : ''}" id="card-${id}" onclick="toggle(${id})">
      <div class="card-header">
        <div style="flex:1;min-width:0">
          <div class="card-name">${hl(fullName, q)}</div>
          <div class="card-city">${hl(city, q)}</div>
        </div>
        <div style="text-align:left;flex-shrink:0">
          <div class="card-phone-preview">${hl(phone, q)}</div>
        </div>
        <div class="chevron">▾</div>
      </div>
      <div class="card-body">
        <div class="card-body-inner">

          <div class="field wide">
            <div class="field-label">טלפון</div>
            <div class="field-value phone">${phone || '—'}</div>
          </div>

          <div class="field">
            <div class="field-label">יישוב</div>
            <div class="field-value">${city || '—'}</div>
          </div>

          <div class="field">
            <div class="field-label">תאריך לידה${isHebrew ? ' (עברי)' : ''}</div>
            <div class="field-value">${dob || '—'}</div>
          </div>

          <div class="field">
            <div class="field-label">דגם הרכב</div>
            <div class="field-value">${car || '—'}</div>
          </div>

          <div class="field">
            <div class="field-label">כננת</div>
            ${yesNo(kananet)}
          </div>

          <div class="field">
            <div class="field-label">ערכת פתיחה</div>
            ${yesNo(ereket)}
          </div>

          <div class="field">
            <div class="field-label">אפוד זוהר</div>
            ${yesNo(apod)}
          </div>

          <div class="field wide">
            <div class="field-label">הדרכות</div>
            ${hadDisplay}
          </div>

          <div class="actions">
            <a class="btn btn-call" href="tel:${phone}">📞 התקשר</a>
            <a class="btn btn-whatsapp" href="https://wa.me/${waPhone}">💬 וואטסאפ</a>
            <button class="save-contact-btn" onclick="event.stopPropagation();saveContact('${fullName.replace(/'/g,"\\'")}','${phone}','${city.replace(/'/g,"\\'")}')">👤 שמור</button>
          </div>

        </div>
      </div>
    </div>`;
  }).join('');
}

function toggle(id) {
  if (openId === id) { openId = null; render(); return; }
  openId = id;
  render();
  setTimeout(() => {
    const el = document.getElementById('card-' + id);
    if (!el) return;
    const headerH = document.querySelector('.header')?.offsetHeight || 0;
    const windowH = window.innerHeight;
    const cardH   = el.offsetHeight;
    const cardTop = el.getBoundingClientRect().top + window.scrollY;
    const target  = cardTop - headerH - Math.max(8, (windowH - headerH - cardH) / 2);
    window.scrollTo({ top: Math.max(0, target), behavior: 'smooth' });
  }, 60);
}

function toggleF(group, val) {
  F[group] = (F[group] === val) ? null : val;
  updateChips();
  render();
}

function updateChips() {
  [
    ['f-kananet-yes', 'kananet', 'yes'],
    ['f-kananet-no',  'kananet', 'no' ],
    ['f-apod-yes',    'apod',    'yes'],
    ['f-apod-no',     'apod',    'no' ],
    ['f-ereket-yes',  'ereket',  'yes'],
    ['f-ereket-no',   'ereket',  'no' ],
  ].forEach(([id, group, val]) => {
    const el = document.getElementById(id);
    if (!el) return;
    el.className = 'chip';
    if (F[group] === val) el.classList.add(val === 'yes' ? 'on-yes' : 'on-no');
  });
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('clearBtn').style.display = 'none';
  document.getElementById('searchIcon').style.display = 'block';
  render();
}

function resetAll() {
  clearSearch();
  F = { kananet: null, apod: null, ereket: null };
  updateChips();
  openId = null;
  render();
}

document.getElementById('searchInput').addEventListener('input', function() {
  const hv = this.value.length > 0;
  document.getElementById('clearBtn').style.display = hv ? 'block' : 'none';
  document.getElementById('searchIcon').style.display = hv ? 'none' : 'block';
  render();
});

// ── Export filtered results as CSV ──────────────────────────────
function exportCSV() {
  const q = document.getElementById('searchInput').value;
  const results = DATA.filter(row => matchesFilters(row) && matchesSearch(row, q));
  if (!results.length) { alert('אין תוצאות לייצוא'); return; }

  const headers = ['שם מלא','טלפון','יישוב','רכב','כננת','אפוד זוהר','ערכת פתיחה','הדרכות'];
  const rows = results.map(row => {
    const r = row._raw;
    const name  = (g(r, C.FIRST) + ' ' + g(r, C.LAST)).trim();
    const phone = g(r, C.PHONE);
    const city  = g(r, C.CITY);
    const car   = g(r, C.CAR);
    const kan   = getKananet(r) ? 'יש' : 'אין';
    const apod  = getApod(r)    ? 'יש' : 'אין';
    const erek  = getEreket(r)  ? 'יש' : 'אין';
    const had   = getHadList(r).join(' | ') || '—';
    return [name, phone, city, car, kan, apod, erek, had]
      .map(v => `"${(v||'').replace(/"/g,'""')}"`).join(',');
  });

  const bom = '\uFEFF'; // UTF-8 BOM for Hebrew in Excel
  const csv = bom + [headers.join(','), ...rows].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const ts   = new Date().toLocaleDateString('he-IL').replace(/\./g, '-');
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `פנתר_${ts}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

function foldVcardLine(label, data) {
  const full = label + data;
  const lines = [full.slice(0, 75)];
  let pos = 75;
  while (pos < full.length) {
    lines.push(' ' + full.slice(pos, pos + 74));
    pos += 74;
  }
  return lines.join('\r\n');
}

function saveContact(name, phone, city) {
  const nameParts = name.trim().split(' ');
  const lastName  = nameParts.length > 1 ? nameParts.slice(1).join(' ') : '';
  const firstName = nameParts[0] || name;
  const phoneClean = phone.replace(/\D/g, '');
  const tel = phoneClean.startsWith('972') ? '+' + phoneClean :
              phoneClean.startsWith('0')   ? '+972' + phoneClean.slice(1) : phone;

  const photoLine = foldVcardLine('PHOTO;ENCODING=b;TYPE=JPEG:', CONTACT_PHOTO_B64);

  const vcardLines = [
    'BEGIN:VCARD',
    'VERSION:3.0',
    `N:${lastName};${firstName};;;`,
    `FN:${name}`,
    `TEL;TYPE=CELL:${tel}`,
    city ? `ADR;TYPE=HOME:;;${city};;;;` : '',
    'ORG:יחידת פנתר',
    'TITLE:מתנדב',
    'NOTE:פנתר 4X4',
    photoLine,
    'END:VCARD'
  ].filter(Boolean);

  const vcard = vcardLines.join('\r\n') + '\r\n';

  const blob = new Blob([vcard], { type: 'text/vcard;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `${name}.vcf`;
  a.click();
  URL.revokeObjectURL(url);
}
